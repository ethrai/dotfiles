<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
 <description>Disable ligatures for monospaced fonts to avoid ff, fi, ffi, etc. becoming only one character wide</description>
  <match target="font">
    <test name="family" compare="eq" ignore-blanks="true">
      <string>JetBrains Mono</string>
    </test>
    <edit name="fontfeatures" mode="append">
      <string>calt off</string>
      <string>zero on</string>
    </edit>
  </match>
  <match target="font">
          <test name="family" compare="eq" ignore-blanks="true">
                  <string>Inter</string>
          </test>
          <edit name="fontfeatures" mode="append">
                  <string>calt on</string>
                  <string>dlig off</string>
                  <string>tnum on</string>
                  <string>case on</string>
                  <string>ss01 on</string>
                  <string>ss02 on</string>
                  <string>ss07 on</string>
                  <string>ss08 on</string>
          </edit>
  </match>
  <alias>
    <family>serif</family>
    <prefer>
      <family>IBM Plex Serif</family>
      <family>Symbols Nerd Font</family>
    </prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>IBM Plex Sans</family>
      <family>Symbols Nerd Font</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>IBM Plex Mono</family>
    </prefer>
    </alias>
</fontconfig>
