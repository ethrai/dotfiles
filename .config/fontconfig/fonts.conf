<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <description>Enable some typographic features of Inter font, for all applications.</description>
  <match target="font">
          <test name="family" compare="eq" ignore-blanks="true">
                  <string>Inter</string>
          </test>
          <edit name="fontfeatures" mode="append">
                  <string>calt on</string>
                  <string>dlig on</string>
                  <string>tnum on</string>
                  <string>case on</string>
                  <string>ss01 on</string>
                  <string>ss02 on</string>
                  <string>ss07 on</string>
                  <string>ss08 on</string>
          </edit>
  </match>
  <match target="font">
          <test name="family" compare="eq" ignore-blanks="true">
                  <string>Iosevka Nerd Font</string>
          </test>
          <edit name="fontfeatures" mode="append">
                  <string>ss18 on</string>
          </edit>
  </match>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Merriweather</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Iosevka Nerd Font</family>
    </prefer>
  </alias>
</fontconfig>
