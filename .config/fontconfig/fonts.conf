<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <description>Enable some typographic features of Inter font, for all applications.</description>
  <match target="font">
          <test name="family" compare="eq" ignore-blanks="true">
                  <string>Inter</string>
          </test>
          <edit name="fontfeatures" mode="append">
                  <string>dlig on</string>
                  <string>dlig on</string>
                  <string>tnum on</string>
                  <string>ccmp on</string>
                  <string>ss01 on</string>
                  <string>ss02 on</string>
          </edit>
  </match>
  <match target="pattern">
    <test name="family" compare="eq">
      <string>monospace</string>
    </test>
    <edit name="size" mode="assign">
      <double>17</double> <!-- Set your preferred font size here -->
    </edit>
  </match>
  <alias>
    <family>serif</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Inter</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Iosevka Nerd Font</family>
    </prefer>
  </alias>
</fontconfig>
