#################
### AUTOSTART ###
#################

exec-once = $terminal
exec-once = mullvad-vpn
exec-once = wlsunset -l 48.864716 -L 23.685893
exec-once = firefox
exec-once = hyprpm reload -n
exec-once = waybar & hyprpaper & hypridle & dunst & nm-applet & blueman-applet &
exec-once=/usr/lib/polkit-kde-authentication-agent-1
exec-once = dolphin
exec-once = telegram-desktop

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once=hyprctl setcursor catppuccin-mocha-dark-cursors 24


# exec = gsettings set org.gnome.desktop.interface cursor-theme 'Catppuccin-Mocha-Dark'
exec = gsettings set org.gnome.desktop.interface cursor-size 24
exec = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
exec = gsettings set org.gnome.desktop.interface gtk-theme 'catppuccin-mocha-mauve-standard+default'
exec = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
