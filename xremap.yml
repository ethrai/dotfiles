modmap:
  - name: Global
    remap:
      CapsLock:
        held: leftctrl
        alone: esc
        alone_timeout_millis: 150

keymap:
  - name: IDEA (modified from Default)
    application:
      only: jetbrains-idea
    remap:
      # Emacs basic
      # C-b: left  # for Vim
      # C-f: right # for Vim
      C-k: up
      C-j: down
      C-h: left
      C-l: right

  - name: Firefox
    application:
      only: firefox
    remap:
      M-k: C-Shift-tab
      M-j: C-tab
      Super-s: C-f

